<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melodify — Music Player</title>
  <link rel="stylesheet" href="style.css?v=5"/>
</head>
<body>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">
        <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#fc3c44"/><path d="M9.5 7.5v9l7-4.5z" fill="#fff"/></svg>
        Melodify
      </div>
      <button class="sb-x" id="sbX">✕</button>
    </div>
    <div class="sb-label">Queue — <span id="qCount">10 songs</span></div>
    <ul class="sb-queue" id="sbQueue"></ul>
  </aside>
  <div class="sb-mask" id="sbMask"></div>

  <!-- ── PLAYER ── -->
  <main class="player" id="player">

    <!-- Top bar -->
    <div class="p-topbar">
      <button class="p-icon-btn" id="btnMenu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="p-topbar-title">Now Playing</span>
      <button class="p-icon-btn" id="btnFav">
        <svg id="favSvg" viewBox="0 0 24 24" fill="none" stroke="#fc3c44" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>

    <div class="p-scroll">

      <!-- YouTube notice banner -->
      <div class="yt-banner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#fc3c44"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><polygon points="9.6 15.6 15.8 12 9.6 8.4 9.6 15.6" fill="white"/></svg>
        Playing via YouTube · Real songs · 100% legal
      </div>

      <!-- Art + YouTube player container -->
      <div class="p-art-section">
        <div class="p-art-wrap" id="artWrap">
          <img class="p-art" id="pArt" src="" alt="Album Art"/>
          <!-- Hidden YouTube iframe player -->
          <div id="ytPlayer" class="yt-player-hidden"></div>
        </div>
      </div>

      <!-- Info -->
      <div class="p-info">
        <div>
          <div class="p-song-title" id="pTitle">Select a song</div>
          <div class="p-song-artist" id="pArtist">Loading...</div>
          <div class="p-song-genre" id="pGenre"></div>
        </div>
        <button class="p-icon-btn p-fav-inline" id="btnFav2">
          <svg id="favSvg2" viewBox="0 0 24 24" fill="none" stroke="#fc3c44" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>

      <!-- Seek bar -->
      <div class="p-seek-wrap">
        <div class="p-seek-bar" id="seekBar">
          <div class="p-seek-bg"><div class="p-seek-fill" id="seekFill"></div></div>
        </div>
        <div class="p-times"><span id="curTime">0:00</span><span id="totTime">0:00</span></div>
      </div>

      <!-- Controls -->
      <div class="p-controls">
        <button class="p-ctrl-sm" id="btnShuffle" title="Shuffle (S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="p-ctrl-skip" id="btnPrev" title="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4"/><rect x="5" y="4" width="3" height="16"/></svg>
        </button>
        <button class="p-ctrl-play" id="btnPlay" title="Play/Pause (Space)">
          <svg id="iPlay" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="iPause" class="hidden" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="p-ctrl-skip" id="btnNext" title="Next">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20"/><rect x="16" y="4" width="3" height="16"/></svg>
        </button>
        <button class="p-ctrl-sm" id="btnRepeat" title="Repeat (R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>

      <!-- Volume -->
      <div class="p-vol-row">
        <svg class="p-vol-ico" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
        <div class="p-vol-bar" id="volBar">
          <div class="p-vol-bg"><div class="p-vol-fill" id="volFill" style="width:80%"></div></div>
        </div>
        <svg class="p-vol-ico" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </div>

      <!-- Options -->
      <div class="p-opts">
        <label class="p-tog-label">
          <div class="p-tog"><input type="checkbox" id="chkAutoplay" checked/><span class="p-tog-track"></span></div>
          Autoplay
        </label>
        <label class="p-tog-label">
          <div class="p-tog"><input type="checkbox" id="chkSing"/><span class="p-tog-track"></span></div>
          Speak Lyrics
        </label>
        <a class="yt-open-link" id="ytLink" href="#" target="_blank" title="Open on YouTube">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#fc3c44"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><polygon points="9.6 15.6 15.8 12 9.6 8.4 9.6 15.6" fill="white"/></svg>
          Open on YouTube
        </a>
      </div>

      <!-- Lyrics -->
      <div class="p-lyrics-wrap">
        <div class="p-lyrics-head">Lyrics</div>
        <div class="p-lyrics" id="lyricsEl"></div>
      </div>

    </div><!-- /p-scroll -->
  </main>

</div>

<div class="toast" id="toast"></div>
<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js?v=5"></script>
</body>
</html>
